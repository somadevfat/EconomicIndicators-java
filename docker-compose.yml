version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: portfolio-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: 'portfolio_db'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'rootpassword'
      TZ: 'Asia/Tokyo' # タイムゾーン設定
    ports:
      - "3306:3306" # ローカルからMySQLに接続できるようにポートを公開
    volumes:
      - mysql_data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf # 文字コード設定用 (後で作成)
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    # volumes: 開発時のみ必要。ビルド済みイメージを使用するためコメントアウトしました。
    # - ./backend:/app
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/portfolio_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update # 開発初期はupdateで便利

volumes:
  mysql_data: 